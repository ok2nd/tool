<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIキャラ設定ジェネレーター</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d12;
    --surface: #15151f;
    --surface2: #1c1c2a;
    --border: rgba(200,170,100,0.18);
    --border-hover: rgba(200,170,100,0.4);
    --gold: #c8aa64;
    --gold-light: #e8cc84;
    --gold-dim: rgba(200,170,100,0.5);
    --text: #e8e0d0;
    --text-muted: #8a8070;
    --text-dim: #5a5448;
    --accent: #7b5ea7;
    --accent2: #3d7a6e;
    --red: #a05050;
    --font-title: 'Cinzel Decorative', serif;
    --font-body: 'DM Sans', sans-serif;
    --font-char: 'Playfair Display', serif;
  }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(123,94,167,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(61,122,110,0.06) 0%, transparent 60%);
  }

  /* noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .header-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .ornament-line {
    flex: 1;
    max-width: 120px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dim));
  }
  .ornament-line.right {
    background: linear-gradient(to left, transparent, var(--gold-dim));
  }
  .ornament-diamond {
    width: 8px; height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
    opacity: 0.7;
  }

  h1 {
    font-family: var(--font-title);
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    color: var(--gold);
    letter-spacing: 0.05em;
    line-height: 1.3;
    text-shadow: 0 0 40px rgba(200,170,100,0.3);
  }

  .subtitle {
    font-size: 0.8rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    margin-top: 0.5rem;
    text-transform: uppercase;
  }

  /* Main layout */
  .main {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 1.5rem;
    align-items: start;
  }

  @media (max-width: 800px) {
    .main { grid-template-columns: 1fr; }
  }

  /* Panel */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.5rem;
    position: relative;
  }

  .panel::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 4px;
    background: linear-gradient(135deg, rgba(200,170,100,0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  /* Corner decorations */
  .panel-corner {
    position: absolute;
    width: 12px; height: 12px;
    border-color: var(--gold-dim);
    border-style: solid;
  }
  .panel-corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .panel-corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .panel-corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
  .panel-corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .panel-title {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Form elements */
  .field { margin-bottom: 1.25rem; }

  label {
    display: block;
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .chip-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chip {
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-size: 0.8rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    font-family: var(--font-body);
  }

  .chip:hover {
    border-color: var(--gold-dim);
    color: var(--text);
  }

  .chip.selected {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(200,170,100,0.08);
  }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.85rem;
    padding: 0.75rem;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--gold-dim); }
  textarea::placeholder { color: var(--text-dim); }

  .generate-btn {
    width: 100%;
    padding: 0.9rem;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: var(--font-title);
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    border-radius: 2px;
    margin-top: 0.5rem;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .generate-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(200,170,100,0.12), transparent);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }

  .generate-btn:hover {
    background: rgba(200,170,100,0.1);
    box-shadow: 0 0 20px rgba(200,170,100,0.15);
  }

  .generate-btn:hover::before { transform: translateX(100%); }
  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Result panel */
  .result-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 400px;
    color: var(--text-dim);
    gap: 1rem;
  }

  .result-empty .big-ornament {
    font-size: 3rem;
    opacity: 0.2;
    line-height: 1;
    font-family: var(--font-title);
    color: var(--gold);
  }

  .result-empty p {
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-align: center;
  }

  /* Character card */
  .char-card { display: none; }
  .char-card.visible { display: block; }

  .char-name {
    font-family: var(--font-char);
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    color: var(--gold-light);
    line-height: 1.2;
    margin-bottom: 0.25rem;
  }

  .char-reading {
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    margin-bottom: 1rem;
  }

  .char-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 1.5rem;
  }

  .char-tag {
    font-size: 0.7rem;
    padding: 3px 10px;
    border-radius: 2px;
    letter-spacing: 0.05em;
  }

  .tag-genre { background: rgba(123,94,167,0.2); color: #b095d0; border: 1px solid rgba(123,94,167,0.3); }
  .tag-role  { background: rgba(61,122,110,0.2); color: #7ecabc; border: 1px solid rgba(61,122,110,0.3); }
  .tag-race  { background: rgba(200,170,100,0.1); color: var(--gold); border: 1px solid var(--border); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.25rem 0;
    position: relative;
  }
  .divider::before {
    content: '◆';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%,-50%);
    font-size: 8px;
    color: var(--gold-dim);
    background: var(--surface);
    padding: 0 8px;
  }

  .section-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section-text {
    font-family: var(--font-char);
    font-size: 0.9rem;
    line-height: 1.8;
    color: var(--text);
  }

  .section-text em {
    font-style: italic;
    color: var(--text-muted);
  }

  .quote-block {
    border-left: 2px solid var(--gold-dim);
    padding: 0.75rem 1rem;
    margin: 0.5rem 0;
    background: rgba(200,170,100,0.04);
    border-radius: 0 2px 2px 0;
  }

  .quote-block p {
    font-family: var(--font-char);
    font-style: italic;
    font-size: 1rem;
    color: var(--gold-light);
    line-height: 1.7;
  }

  .secret-box {
    background: rgba(160,80,80,0.08);
    border: 1px solid rgba(160,80,80,0.25);
    border-radius: 2px;
    padding: 0.75rem 1rem;
    margin-top: 0.5rem;
  }

  .secret-box p {
    font-size: 0.85rem;
    line-height: 1.7;
    color: #d09090;
  }

  .relations-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 0.5rem;
  }

  .relation-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0.6rem 0.75rem;
  }

  .relation-name {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }

  .relation-desc {
    font-size: 0.7rem;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* Loading spinner */
  .loader { display: none; }
  .loader.active {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 400px;
    gap: 1.5rem;
  }

  .rune-spinner {
    width: 48px; height: 48px;
    border: 1px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1.2s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* Fade in */
  .char-card.visible {
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Error */
  .error-msg {
    display: none;
    color: #d09090;
    font-size: 0.8rem;
    text-align: center;
    padding: 1rem;
    margin-top: 0.5rem;
    background: rgba(160,80,80,0.08);
    border: 1px solid rgba(160,80,80,0.2);
    border-radius: 2px;
  }

  .section-block { margin-bottom: 1.25rem; }

  /* ability list */
  .ability-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 0.5rem;
  }

  .ability-pill {
    font-size: 0.72rem;
    padding: 4px 10px;
    background: rgba(61,122,110,0.12);
    border: 1px solid rgba(61,122,110,0.25);
    border-radius: 2px;
    color: #7ecabc;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line right"></div>
    </div>
    <h1>Character Genesis</h1>
    <p class="subtitle">AI キャラクター設定ジェネレーター</p>
  </header>

  <div class="main">

    <!-- Left: Form -->
    <div class="panel" id="formPanel">
      <div class="panel-corner tl"></div>
      <div class="panel-corner tr"></div>
      <div class="panel-corner bl"></div>
      <div class="panel-corner br"></div>

      <div class="panel-title">設定入力</div>

      <div class="field">
        <label>世界観 / ジャンル</label>
        <div class="chip-group" id="genreGroup">
          <button class="chip selected" data-val="ファンタジー">ファンタジー</button>
          <button class="chip" data-val="SF">SF</button>
          <button class="chip" data-val="現代">現代</button>
          <button class="chip" data-val="ホラー">ホラー</button>
          <button class="chip" data-val="歴史・時代劇">歴史・時代劇</button>
          <button class="chip" data-val="異世界転生">異世界転生</button>
          <button class="chip" data-val="サイバーパンク">サイバーパンク</button>
          <button class="chip" data-val="和風ファンタジー">和風ファンタジー</button>
        </div>
      </div>

      <div class="field">
        <label>役割 / ポジション</label>
        <div class="chip-group" id="roleGroup">
          <button class="chip selected" data-val="主人公">主人公</button>
          <button class="chip" data-val="ラスボス / 敵">ラスボス / 敵</button>
          <button class="chip" data-val="ライバル">ライバル</button>
          <button class="chip" data-val="師匠 / メンター">師匠 / メンター</button>
          <button class="chip" data-val="仲間 / 相棒">仲間 / 相棒</button>
          <button class="chip" data-val="謎の人物">謎の人物</button>
          <button class="chip" data-val="ヒロイン / ヒーロー">ヒロイン / ヒーロー</button>
        </div>
      </div>

      <div class="field">
        <label>性格のキーワード <span style="color:var(--text-dim); text-transform:none; letter-spacing:0;">（任意・複数可）</span></label>
        <textarea id="traitInput" placeholder="例：クールで無口、でも仲間には熱い。過去に大切なものを失っている。"></textarea>
      </div>

      <div class="field">
        <label>追加リクエスト <span style="color:var(--text-dim); text-transform:none; letter-spacing:0;">（任意）</span></label>
        <textarea id="extraInput" placeholder="例：左目に眼帯をしている。口癖は「…ふん」。魔法は使えないが剣技が天才的。" style="min-height:60px;"></textarea>
      </div>

      <button class="generate-btn" id="generateBtn" onclick="generateCharacter()">
        ✦ キャラクターを召喚する ✦
      </button>

      <div class="error-msg" id="errorMsg"></div>
    </div>

    <!-- Right: Result -->
    <div class="panel" id="resultPanel">
      <div class="panel-corner tl"></div>
      <div class="panel-corner tr"></div>
      <div class="panel-corner bl"></div>
      <div class="panel-corner br"></div>

      <div class="panel-title">キャラクター設定書</div>

      <div class="result-empty" id="emptyState">
        <div class="big-ornament">✦</div>
        <p>左のパネルで設定を選び<br>「召喚する」を押してください</p>
      </div>

      <div class="loader" id="loader">
        <div class="rune-spinner"></div>
        <div class="loading-text">Creating character...</div>
      </div>

      <div class="char-card" id="charCard">

        <div style="margin-bottom:1.25rem;">
          <div class="char-name" id="cName">—</div>
          <div class="char-reading" id="cReading">—</div>
          <div class="char-tags">
            <span class="char-tag tag-genre" id="cGenre">—</span>
            <span class="char-tag tag-role" id="cRole">—</span>
            <span class="char-tag tag-race" id="cRace">—</span>
          </div>
        </div>

        <div class="divider"></div>

        <div class="section-block">
          <div class="section-label">出自・背景</div>
          <div class="section-text" id="cBackground">—</div>
        </div>

        <div class="section-block">
          <div class="section-label">性格</div>
          <div class="section-text" id="cPersonality">—</div>
        </div>

        <div class="section-block">
          <div class="section-label">口調・話し方</div>
          <div class="section-text" id="cSpeech">—</div>
          <div class="quote-block" id="cSampleQuote" style="margin-top:0.75rem;">
            <p id="cQuoteText">—</p>
          </div>
        </div>

        <div class="section-block">
          <div class="section-label">能力・特技</div>
          <div class="ability-list" id="cAbilities">—</div>
        </div>

        <div class="section-block">
          <div class="section-label">隠された秘密</div>
          <div class="secret-box">
            <p id="cSecret">—</p>
          </div>
        </div>

        <div class="section-block">
          <div class="section-label">周囲の人物関係</div>
          <div class="relations-grid" id="cRelations"></div>
        </div>

        <div class="divider"></div>

        <div class="section-block">
          <div class="section-label">名台詞</div>
          <div class="quote-block" style="background:rgba(200,170,100,0.06); border-color:var(--gold-dim);">
            <p id="cCatchphrase" style="color:var(--gold-light); font-size:1.05rem;">—</p>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
function makeChipGroup(groupId) {
  const group = document.getElementById(groupId);
  group.addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    group.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
    chip.classList.add('selected');
  });
}
makeChipGroup('genreGroup');
makeChipGroup('roleGroup');

function getSelected(groupId) {
  const sel = document.querySelector(`#${groupId} .chip.selected`);
  return sel ? sel.dataset.val : '';
}

async function generateCharacter() {
  const genre = getSelected('genreGroup');
  const role  = getSelected('roleGroup');
  const traits = document.getElementById('traitInput').value.trim();
  const extra  = document.getElementById('extraInput').value.trim();

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('charCard').classList.remove('visible');
  document.getElementById('loader').classList.add('active');
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('generateBtn').disabled = true;

  const prompt = `あなたはプロの小説家・ゲームデザイナーです。以下の条件でキャラクター設定を日本語で作成し、必ずJSONのみを返してください（前置き・説明・Markdownコードブロック不要）。

条件:
- 世界観/ジャンル: ${genre}
- 役割: ${role}
${traits ? `- 性格キーワード: ${traits}` : ''}
${extra ? `- 追加リクエスト: ${extra}` : ''}

返すJSONのスキーマ（全フィールド必須）:
{
  "name": "キャラクター名（漢字・カタカナ・英語など世界観に合わせて）",
  "reading": "よみがな または サブタイトル（例：「孤独の剣聖」）",
  "race": "種族 または 出身（例：人間・エルフ・人造人間・元貴族）",
  "background": "出自・生い立ち・これまでの経緯（3〜5文）",
  "personality": "性格の詳細（3〜4文、矛盾や複雑さを含めると良い）",
  "speech": "話し方・口調の特徴（2〜3文）",
  "sampleQuote": "口調を表す短いセリフ例（1〜2文、カギ括弧付き）",
  "abilities": ["能力・特技を簡潔に", "3〜5個の配列"],
  "secret": "本人が隠している秘密や真実（2〜3文、ドラマチックに）",
  "relations": [
    {"name": "人物名", "relation": "関係性と一言説明"},
    {"name": "人物名", "relation": "関係性と一言説明"},
    {"name": "人物名", "relation": "関係性と一言説明"}
  ],
  "catchphrase": "このキャラクターを象徴する名台詞（1文、印象的に）"
}`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await res.json();
    const raw = data.content.map(b => b.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const char = JSON.parse(clean);

    // Populate card
    document.getElementById('cName').textContent = char.name || '—';
    document.getElementById('cReading').textContent = char.reading || '';
    document.getElementById('cGenre').textContent = genre;
    document.getElementById('cRole').textContent = role;
    document.getElementById('cRace').textContent = char.race || '—';
    document.getElementById('cBackground').textContent = char.background || '—';
    document.getElementById('cPersonality').textContent = char.personality || '—';
    document.getElementById('cSpeech').textContent = char.speech || '—';
    document.getElementById('cQuoteText').textContent = char.sampleQuote || '—';
    document.getElementById('cSecret').textContent = char.secret || '—';
    document.getElementById('cCatchphrase').textContent = char.catchphrase || '—';

    // Abilities
    const abilityEl = document.getElementById('cAbilities');
    abilityEl.innerHTML = '';
    (char.abilities || []).forEach(a => {
      const pill = document.createElement('span');
      pill.className = 'ability-pill';
      pill.textContent = a;
      abilityEl.appendChild(pill);
    });

    // Relations
    const relEl = document.getElementById('cRelations');
    relEl.innerHTML = '';
    (char.relations || []).forEach(r => {
      relEl.innerHTML += `<div class="relation-item">
        <div class="relation-name">${r.name}</div>
        <div class="relation-desc">${r.relation}</div>
      </div>`;
    });

    document.getElementById('loader').classList.remove('active');
    document.getElementById('charCard').classList.add('visible');

  } catch (e) {
    document.getElementById('loader').classList.remove('active');
    document.getElementById('emptyState').style.display = 'flex';
    const err = document.getElementById('errorMsg');
    err.style.display = 'block';
    err.textContent = 'エラーが発生しました。もう一度お試しください。';
    console.error(e);
  }

  document.getElementById('generateBtn').disabled = false;
}
</script>
</body>
</html>
