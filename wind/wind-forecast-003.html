<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>風速・波高予報マップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0f1a; --surface: #131929; --surface2: #1a2235;
    --border: rgba(100,160,255,0.15);
    --accent: #4a9eff; --accent2: #00d4aa; --accent3: #a78bfa;
    --text: #e8eef8; --text2: #8ca0c0; --wind-high: #e74c3c;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; min-height: 100vh; }
  header { padding: 1rem 1.5rem; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .logo { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  header h1 { font-size: 15px; font-weight: normal; letter-spacing: 0.12em; text-transform: uppercase; }
  header .subtitle { font-size: 11px; color: var(--text2); margin-left: auto; letter-spacing: 0.08em; }
  .hint-bar { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 0.6rem 1.5rem; font-size: 12px; color: var(--text2); letter-spacing: 0.06em; display: flex; align-items: center; gap: 8px; }
  .hint-bar .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #map { width: 100%; height: 420px; }
  .leaflet-container { background: #f0f0f0; }
  #chart-section { padding: 1.5rem; display: none; }
  .location-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 12px; }
  .location-info h2 { font-size: 13px; font-weight: normal; letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
  .location-info .coords { font-size: 12px; color: var(--text2); }
  .stats-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 16px; min-width: 115px; }
  .stat-card .label { font-size: 10px; color: var(--text2); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px; }
  .stat-card .sublabel { font-size: 9px; color: var(--text2); opacity: 0.7; margin-bottom: 5px; letter-spacing: 0.04em; }
  .stat-card .value { font-size: 20px; font-weight: bold; }
  .stat-card .unit { font-size: 11px; color: var(--text2); margin-left: 3px; }
  .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem 1.25rem 1rem; margin-bottom: 1.25rem; }
  .chart-title { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text2); margin-bottom: 1rem; }
  .ccw { position: relative; width: 100%; height: 260px; }
  .legend-row { display: flex; gap: 20px; margin-top: 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); }
  .ld { width: 10px; height: 3px; border-radius: 2px; }
  #loading { display: none; padding: 2rem; text-align: center; color: var(--text2); font-size: 12px; letter-spacing: 0.1em; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .wave-na { text-align: center; padding: 1.2rem; color: var(--text2); font-size: 12px; }
  .leaflet-popup-content-wrapper { background: #131929 !important; border: 1px solid rgba(74,158,255,0.4) !important; border-radius: 6px !important; color: #e8eef8 !important; }
  .leaflet-popup-tip { background: #131929 !important; }
</style>
</head>
<body>
<header>
  <div class="logo">🌬</div>
  <h1>Wind &amp; Wave Forecast</h1>
  <span class="subtitle">Open-Meteo API</span>
</header>
<div class="hint-bar">
  <span class="dot"></span>
  地図をクリックすると、その地点の7日間風速・波高予報を表示します
</div>
<div id="map"></div>
<div id="loading"><div class="spinner"></div>データ取得中...</div>

<div id="chart-section">
  <div class="location-header">
    <div class="location-info">
      <h2 id="loc-name">予報地点</h2>
      <div class="coords" id="loc-coords"></div>
    </div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="label">現在の風速</div>
        <div class="sublabel" id="stat-now-time">--</div>
        <div class="value" id="stat-now" style="color:var(--accent)">--<span class="unit">m/s</span></div>
      </div>
      <div class="stat-card">
        <div class="label">7日間 最大</div>
        <div class="sublabel" id="stat-max-time">--</div>
        <div class="value" id="stat-max" style="color:var(--wind-high)">--<span class="unit">m/s</span></div>
      </div>
      <div class="stat-card">
        <div class="label">7日間 平均</div>
        <div class="sublabel">&nbsp;</div>
        <div class="value" id="stat-avg" style="color:var(--text)">--<span class="unit">m/s</span></div>
      </div>
    </div>
  </div>

  <div class="chart-wrap">
    <div class="chart-title">風速予報（10m高度・7日間）</div>
    <div class="ccw"><canvas id="windChart" role="img" aria-label="7日間風速予報">風速データなし</canvas></div>
    <div class="legend-row">
      <div class="legend-item"><div class="ld" style="background:#4a9eff"></div>風速 (m/s)</div>
      <div class="legend-item"><div class="ld" style="border-top:2px dashed #00d4aa;background:none"></div>突風 (m/s)</div>
    </div>
  </div>

  <div class="chart-wrap" id="wave-wrap">
    <div class="chart-title">波高予報（7日間）</div>
    <div class="ccw" id="wave-ccw"><canvas id="waveChart" role="img" aria-label="7日間波高予報">波高データなし</canvas></div>
    <div class="wave-na" id="wave-na" style="display:none">⚠ この地点の波高データは取得できません（内陸部または対応エリア外）</div>
    <div class="legend-row" id="wave-legend">
      <div class="legend-item"><div class="ld" style="background:#a78bfa"></div>有義波高 (m)</div>
    </div>
  </div>
</div>

<script>
const map = L.map('map').setView([36.5, 136], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19, subdomains: 'abcd'
}).addTo(map);

let marker = null, windChart = null, waveChart = null;

const pinIcon = L.divIcon({
  className: '',
  html: '<div style="width:14px;height:14px;background:#4a9eff;border-radius:50%;border:2px solid #fff;box-shadow:0 0 8px rgba(74,158,255,0.8)"></div>',
  iconSize: [14,14], iconAnchor: [7,7]
});

map.on('click', async (e) => {
  const lat = e.latlng.lat, lng = e.latlng.lng;
  if (marker) map.removeLayer(marker);
  marker = L.marker([lat, lng], { icon: pinIcon }).addTo(map);
  document.getElementById('chart-section').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  try {
    const [wdRes, wvRes] = await Promise.all([
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lng.toFixed(4)}&hourly=windspeed_10m,windgusts_10m,winddirection_10m&wind_speed_unit=ms&timezone=Asia%2FTokyo&forecast_days=7`),
      fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${lat.toFixed(4)}&longitude=${lng.toFixed(4)}&hourly=wave_height&timezone=Asia%2FTokyo&forecast_days=7`)
    ]);
    const [wd, wv] = await Promise.all([wdRes.json(), wvRes.json()]);
    renderAll(wd, wv, lat, lng);
  } catch(err) {
    document.getElementById('loading').style.display = 'none';
    alert('データの取得に失敗しました: ' + err.message);
  }
});

function dayBoundaries(times) {
  return times.reduce((acc, t, i) => {
    if (i === 0) return acc;
    const d = new Date(t);
    if (d.getHours() === 0) {
      const dow = ['日','月','火','水','木','金','土'][d.getDay()];
      acc.push({ index: i, label: `${d.getMonth()+1}/${d.getDate()}（${dow}）` });
    }
    return acc;
  }, []);
}

function buildLabels(times) {
  return times.map(t => { const d = new Date(t); return d.getHours() % 6 === 0 ? `${d.getHours()}:00` : ''; });
}

function makeDayPlugin(bounds) {
  return {
    id: 'dayBands',
    beforeDraw(chart) {
      const { ctx, chartArea: ca, scales } = chart;
      if (!ca) return;
      ctx.save();
      bounds.forEach(({ index, label }) => {
        const x = scales.x.getPixelForValue(index);
        ctx.strokeStyle = 'rgba(60,80,120,0.28)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4,3]);
        ctx.beginPath(); ctx.moveTo(x, ca.top); ctx.lineTo(x, ca.bottom); ctx.stroke();
        ctx.setLineDash([]);
        ctx.font = '10px "Courier New",monospace';
        const bw = ctx.measureText(label).width + 14, bh = 18;
        const bx = x + 4, by = ca.top + 4;
        ctx.fillStyle = 'rgba(30,60,120,0.78)';
        ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 3); ctx.fill();
        ctx.fillStyle = '#cfe0ff'; ctx.textBaseline = 'middle';
        ctx.fillText(label, bx + 7, by + bh / 2);
      });
      ctx.restore();
    }
  };
}

function baseOptions(times, yLabel, tooltipLabel) {
  return {
    responsive: true, maintainAspectRatio: false,
    interaction: { intersect: false, mode: 'index' },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1a2235', borderColor: 'rgba(74,158,255,0.4)', borderWidth: 1,
        titleColor: '#8ca0c0', bodyColor: '#e8eef8', padding: 10,
        titleFont: { family: 'Courier New', size: 11 },
        bodyFont: { family: 'Courier New', size: 12 },
        callbacks: {
          title: (items) => {
            const t = new Date(times[items[0].dataIndex]);
            const dow = ['日','月','火','水','木','金','土'][t.getDay()];
            return `${t.getMonth()+1}/${t.getDate()}（${dow}） ${String(t.getHours()).padStart(2,'0')}:00`;
          },
          label: tooltipLabel
        }
      }
    },
    scales: {
      x: {
        grid: { color: 'rgba(100,160,255,0.06)', drawTicks: false },
        border: { color: 'rgba(100,160,255,0.15)' },
        ticks: { color: '#8ca0c0', font: { family: 'Courier New', size: 10 }, maxRotation: 0, autoSkip: false }
      },
      y: {
        grid: { color: 'rgba(100,160,255,0.08)' },
        border: { color: 'rgba(100,160,255,0.15)', dash: [4,4] },
        ticks: { color: '#8ca0c0', font: { family: 'Courier New', size: 10 }, callback: yLabel },
        min: 0
      }
    }
  };
}

function renderAll(wd, wv, lat, lng) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('chart-section').style.display = 'block';

  const times = wd.hourly.time;
  const speeds = wd.hourly.windspeed_10m;
  const gusts = wd.hourly.windgusts_10m;
  const dirs = wd.hourly.winddirection_10m;

  // Current wind: match nearest past hour
  const now = new Date();
  const nowStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}T${String(now.getHours()).padStart(2,'0')}:00`;
  let ni = times.findIndex(t => t === nowStr);
  if (ni < 0) ni = 0;
  const nt = new Date(times[ni]);
  document.getElementById('stat-now').innerHTML = `${speeds[ni].toFixed(1)}<span class="unit">m/s</span>`;
  document.getElementById('stat-now-time').textContent = `${nt.getMonth()+1}/${nt.getDate()} ${String(nt.getHours()).padStart(2,'0')}:00 現在`;

  // 7-day max
  let mi = 0; speeds.forEach((v,i) => { if (v > speeds[mi]) mi = i; });
  const mt = new Date(times[mi]);
  document.getElementById('stat-max').innerHTML = `${speeds[mi].toFixed(1)}<span class="unit">m/s</span>`;
  document.getElementById('stat-max-time').textContent = `${mt.getMonth()+1}/${mt.getDate()} ${String(mt.getHours()).padStart(2,'0')}:00 予報`;

  // avg
  const avg = (speeds.reduce((a,b) => a+b, 0) / speeds.length).toFixed(1);
  document.getElementById('stat-avg').innerHTML = `${avg}<span class="unit">m/s</span>`;

  document.getElementById('loc-name').textContent = '予報地点';
  document.getElementById('loc-coords').textContent = `lat: ${lat.toFixed(4)}  lon: ${lng.toFixed(4)}`;

  // Wind chart
  const labels = buildLabels(times);
  const bounds = dayBoundaries(times);
  if (windChart) windChart.destroy();
  const wOpts = baseOptions(times, v => v.toFixed(0) + ' m/s', (item) => {
    if (item.datasetIndex === 0) return ` 風速: ${item.parsed.y.toFixed(1)} m/s  ${degToDir(dirs[item.dataIndex])}`;
    return ` 突風: ${item.parsed.y.toFixed(1)} m/s`;
  });
  windChart = new Chart(document.getElementById('windChart'), {
    type: 'line', plugins: [makeDayPlugin(bounds)],
    data: { labels, datasets: [
      {
        label: '風速', data: speeds, borderColor: '#4a9eff', borderWidth: 2, fill: true, tension: 0.3,
        pointRadius: 0, pointHoverRadius: 4, pointHoverBackgroundColor: '#4a9eff',
        backgroundColor: (ctx) => {
          const ca = ctx.chart.chartArea;
          if (!ca) return 'rgba(74,158,255,0.1)';
          const g = ctx.chart.ctx.createLinearGradient(0, ca.top, 0, ca.bottom);
          g.addColorStop(0, 'rgba(74,158,255,0.28)'); g.addColorStop(1, 'rgba(74,158,255,0)');
          return g;
        }
      },
      {
        label: '突風', data: gusts, borderColor: '#00d4aa', borderWidth: 1.5, borderDash: [5,4],
        backgroundColor: 'transparent', fill: false, tension: 0.3,
        pointRadius: 0, pointHoverRadius: 4, pointHoverBackgroundColor: '#00d4aa'
      }
    ]},
    options: wOpts
  });

  // Wave chart
  const hasWave = wv && wv.hourly && Array.isArray(wv.hourly.wave_height) && wv.hourly.wave_height.some(v => v !== null);
  if (hasWave) {
    document.getElementById('wave-ccw').style.display = 'block';
    document.getElementById('wave-na').style.display = 'none';
    document.getElementById('wave-legend').style.display = 'flex';
    const wvTimes = wv.hourly.time;
    const wvH = wv.hourly.wave_height;
    if (waveChart) waveChart.destroy();
    const waOpts = baseOptions(wvTimes, v => v.toFixed(1) + ' m', (item) => ` 波高: ${item.parsed.y.toFixed(2)} m`);
    waveChart = new Chart(document.getElementById('waveChart'), {
      type: 'line', plugins: [makeDayPlugin(dayBoundaries(wvTimes))],
      data: { labels: buildLabels(wvTimes), datasets: [{
        label: '有義波高', data: wvH, borderColor: '#a78bfa', borderWidth: 2, fill: true, tension: 0.3,
        pointRadius: 0, pointHoverRadius: 4, pointHoverBackgroundColor: '#a78bfa',
        backgroundColor: (ctx) => {
          const ca = ctx.chart.chartArea;
          if (!ca) return 'rgba(167,139,250,0.1)';
          const g = ctx.chart.ctx.createLinearGradient(0, ca.top, 0, ca.bottom);
          g.addColorStop(0, 'rgba(167,139,250,0.28)'); g.addColorStop(1, 'rgba(167,139,250,0)');
          return g;
        }
      }]},
      options: waOpts
    });
  } else {
    document.getElementById('wave-ccw').style.display = 'none';
    document.getElementById('wave-na').style.display = 'block';
    document.getElementById('wave-legend').style.display = 'none';
    if (waveChart) { waveChart.destroy(); waveChart = null; }
  }
}

function degToDir(deg) {
  return ['北','北北東','北東','東北東','東','東南東','南東','南南東','南','南南西','南西','西南西','西','西北西','北西','北北西'][Math.round(deg/22.5)%16];
}
</script>
</body>
</html>
