<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>風速予報マップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0f1a;
    --surface: #131929;
    --surface2: #1a2235;
    --border: rgba(100,160,255,0.15);
    --accent: #4a9eff;
    --accent2: #00d4aa;
    --text: #e8eef8;
    --text2: #8ca0c0;
    --wind-low: #00d4aa;
    --wind-mid: #f5a623;
    --wind-high: #e74c3c;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
  }

  header {
    padding: 1rem 1.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  header h1 {
    font-size: 15px;
    font-weight: normal;
    letter-spacing: 0.12em;
    color: var(--text);
    text-transform: uppercase;
  }

  header .subtitle {
    font-size: 11px;
    color: var(--text2);
    margin-left: auto;
    letter-spacing: 0.08em;
  }

  .hint-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 1.5rem;
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 0.06em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .hint-bar .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  #map {
    width: 100%;
    height: 420px;
    position: relative;
  }

  .leaflet-container {
    background: #f0f0f0;
  }

  #chart-section {
    padding: 1.5rem;
    display: none;
  }

  .location-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    gap: 12px;
  }

  .location-info h2 {
    font-size: 13px;
    font-weight: normal;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .location-info .coords {
    font-size: 12px;
    color: var(--text2);
    font-family: 'Courier New', monospace;
  }

  .stats-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 16px;
    min-width: 100px;
  }

  .stat-card .label {
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .stat-card .value {
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 0.04em;
  }

  .stat-card .unit {
    font-size: 11px;
    color: var(--text2);
    margin-left: 3px;
  }

  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem 1.25rem 1rem;
  }

  .chart-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 1rem;
  }

  #chartContainer {
    position: relative;
    width: 100%;
    height: 280px;
  }

  .legend-row {
    display: flex;
    gap: 20px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text2);
  }

  .legend-dot {
    width: 10px; height: 3px;
    border-radius: 2px;
  }

  #loading {
    display: none;
    padding: 2rem;
    text-align: center;
    color: var(--text2);
    font-size: 12px;
    letter-spacing: 0.1em;
  }

  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .wind-scale {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-left: auto;
    font-size: 10px;
    color: var(--text2);
  }

  .wind-scale-bar {
    display: flex;
    gap: 2px;
    align-items: center;
  }

  .ws {
    width: 24px; height: 8px;
    border-radius: 2px;
  }

  #marker-popup {
    background: var(--surface) !important;
    color: var(--text) !important;
    border: 1px solid var(--accent) !important;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
  }

  .leaflet-popup-content-wrapper {
    background: #131929 !important;
    border: 1px solid rgba(74,158,255,0.4) !important;
    border-radius: 6px !important;
    color: #e8eef8 !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
  }

  .leaflet-popup-tip {
    background: #131929 !important;
  }
</style>
</head>
<body>

<header>
  <div class="logo">🌬</div>
  <h1>Wind Forecast</h1>
  <span class="subtitle">Powered by Open-Meteo API</span>
</header>

<div class="hint-bar">
  <span class="dot"></span>
  地図をクリックすると、その地点の7日間風速予報を表示します
</div>

<div id="map"></div>

<div id="loading">
  <div class="spinner"></div>
  データ取得中...
</div>

<div id="chart-section">
  <div class="location-header">
    <div class="location-info">
      <h2 id="loc-name">地点情報</h2>
      <div class="coords" id="loc-coords"></div>
    </div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="label">最大風速</div>
        <div class="value" id="stat-max" style="color: var(--wind-high)">--<span class="unit">m/s</span></div>
      </div>
      <div class="stat-card">
        <div class="label">平均風速</div>
        <div class="value" id="stat-avg" style="color: var(--accent)">--<span class="unit">m/s</span></div>
      </div>
      <div class="stat-card">
        <div class="label">最小風速</div>
        <div class="value" id="stat-min" style="color: var(--wind-low)">--<span class="unit">m/s</span></div>
      </div>
    </div>
  </div>

  <div class="chart-wrap">
    <div style="display:flex; align-items:center; margin-bottom:1rem;">
      <span class="chart-title">hourly wind speed — 7 days forecast (10m altitude)</span>
      <div class="wind-scale">
        <span>弱</span>
        <div class="wind-scale-bar">
          <div class="ws" style="background: var(--wind-low)"></div>
          <div class="ws" style="background: var(--wind-mid)"></div>
          <div class="ws" style="background: var(--wind-high)"></div>
        </div>
        <span>強</span>
      </div>
    </div>
    <div id="chartContainer">
      <canvas id="windChart" role="img" aria-label="地点別7日間風速予報折れ線グラフ">風速データが読み込まれていません</canvas>
    </div>
    <div class="legend-row">
      <div class="legend-item">
        <div class="legend-dot" style="background: var(--accent);"></div>
        風速 10m (m/s)
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background: var(--accent2); height: 2px; border-top: 2px dashed var(--accent2); background: none;"></div>
        突風 10m (m/s)
      </div>
    </div>
  </div>
</div>

<script>
const map = L.map('map', {
  center: [36.5, 136],
  zoom: 5,
  zoomControl: true,
}).setView([36.5, 136], 5);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  maxZoom: 19,
  subdomains: 'abcd'
}).addTo(map);

let marker = null;
let windChart = null;

const windIcon = L.divIcon({
  className: '',
  html: `<div style="width:14px;height:14px;background:var(--accent,#4a9eff);border-radius:50%;border:2px solid #fff;box-shadow:0 0 8px rgba(74,158,255,0.8);"></div>`,
  iconSize: [14, 14],
  iconAnchor: [7, 7]
});

map.on('click', async function(e) {
  const lat = e.latlng.lat;
  const lng = e.latlng.lng;

  if (marker) map.removeLayer(marker);
  marker = L.marker([lat, lng], { icon: windIcon }).addTo(map);

  document.getElementById('chart-section').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lng.toFixed(4)}&hourly=windspeed_10m,windgusts_10m,winddirection_10m&wind_speed_unit=ms&timezone=Asia%2FTokyo&forecast_days=7`;
    const res = await fetch(url);
    const data = await res.json();

    renderChart(data, lat, lng);
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    alert('データの取得に失敗しました: ' + err.message);
  }
});

function renderChart(data, lat, lng) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('chart-section').style.display = 'block';

  const hours = data.hourly.time;
  const speeds = data.hourly.windspeed_10m;
  const gusts = data.hourly.windgusts_10m;

  const labels = hours.map((t, i) => {
    const d = new Date(t);
    return d.getHours() % 6 === 0 ? `${d.getHours()}:00` : '';
  });

  const dayBoundaries = [];
  hours.forEach((t, i) => {
    const d = new Date(t);
    if (i > 0 && d.getHours() === 0) {
      dayBoundaries.push({ index: i, label: `${d.getMonth()+1}/${d.getDate()}（${['日','月','火','水','木','金','土'][d.getDay()]}）` });
    }
  });

  const dayBandsPlugin = {
    id: 'dayBands',
    beforeDraw(chart) {
      const { ctx, chartArea, scales } = chart;
      if (!chartArea) return;
      ctx.save();
      dayBoundaries.forEach(({ index, label }) => {
        const x = scales.x.getPixelForValue(index);
        ctx.strokeStyle = 'rgba(60,80,120,0.25)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 3]);
        ctx.beginPath();
        ctx.moveTo(x, chartArea.top);
        ctx.lineTo(x, chartArea.bottom);
        ctx.stroke();
        ctx.setLineDash([]);
        const badgeH = 18;
        const badgeW = ctx.measureText(label).width + 14;
        const bx = x + 4;
        const by = chartArea.top + 4;
        ctx.fillStyle = 'rgba(30,60,120,0.75)';
        ctx.beginPath();
        ctx.roundRect(bx, by, badgeW, badgeH, 3);
        ctx.fill();
        ctx.fillStyle = '#cfe0ff';
        ctx.font = '10px "Courier New", monospace';
        ctx.textBaseline = 'middle';
        ctx.fillText(label, bx + 7, by + badgeH / 2);
      });
      ctx.restore();
    }
  };

  const max = Math.max(...speeds).toFixed(1);
  const min = Math.min(...speeds).toFixed(1);
  const avg = (speeds.reduce((a,b) => a+b, 0) / speeds.length).toFixed(1);

  document.getElementById('stat-max').innerHTML = `${max}<span class="unit">m/s</span>`;
  document.getElementById('stat-avg').innerHTML = `${avg}<span class="unit">m/s</span>`;
  document.getElementById('stat-min').innerHTML = `${min}<span class="unit">m/s</span>`;
  document.getElementById('loc-name').textContent = `予報地点`;
  document.getElementById('loc-coords').textContent = `lat: ${lat.toFixed(4)}  lon: ${lng.toFixed(4)}`;

  const gradient = (ctx) => {
    const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 280);
    g.addColorStop(0, 'rgba(74, 158, 255, 0.3)');
    g.addColorStop(1, 'rgba(74, 158, 255, 0.0)');
    return g;
  };

  if (windChart) windChart.destroy();

  windChart = new Chart(document.getElementById('windChart'), {
    type: 'line',
    plugins: [dayBandsPlugin],
    data: {
      labels,
      datasets: [
        {
          label: '風速 (m/s)',
          data: speeds,
          borderColor: '#4a9eff',
          backgroundColor: function(context) {
            const chart = context.chart;
            const { ctx, chartArea } = chart;
            if (!chartArea) return 'rgba(74,158,255,0.1)';
            const g = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
            g.addColorStop(0, 'rgba(74,158,255,0.25)');
            g.addColorStop(1, 'rgba(74,158,255,0.0)');
            return g;
          },
          borderWidth: 2,
          fill: true,
          tension: 0.3,
          pointRadius: 0,
          pointHoverRadius: 4,
          pointHoverBackgroundColor: '#4a9eff',
        },
        {
          label: '突風 (m/s)',
          data: gusts,
          borderColor: '#00d4aa',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          borderDash: [5, 4],
          fill: false,
          tension: 0.3,
          pointRadius: 0,
          pointHoverRadius: 4,
          pointHoverBackgroundColor: '#00d4aa',
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {
        intersect: false,
        mode: 'index'
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a2235',
          borderColor: 'rgba(74,158,255,0.4)',
          borderWidth: 1,
          titleColor: '#8ca0c0',
          bodyColor: '#e8eef8',
          padding: 10,
          titleFont: { family: 'Courier New', size: 11 },
          bodyFont: { family: 'Courier New', size: 12 },
          callbacks: {
            title: (items) => {
              const idx = items[0].dataIndex;
              const t = new Date(data.hourly.time[idx]);
              const wd = data.hourly.winddirection_10m[idx];
              const dir = degToDir(wd);
              return `${t.getMonth()+1}/${t.getDate()} ${String(t.getHours()).padStart(2,'0')}:00  ${dir} (${wd}°)`;
            },
            label: (item) => {
              return ` ${item.dataset.label}: ${item.parsed.y.toFixed(1)} m/s`;
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(100,160,255,0.06)', drawTicks: false },
          border: { color: 'rgba(100,160,255,0.15)' },
          ticks: {
            color: '#8ca0c0',
            font: { family: 'Courier New', size: 10 },
            maxRotation: 0,
            autoSkip: false,
          }
        },
        y: {
          grid: { color: 'rgba(100,160,255,0.08)' },
          border: { color: 'rgba(100,160,255,0.15)', dash: [4, 4] },
          ticks: {
            color: '#8ca0c0',
            font: { family: 'Courier New', size: 10 },
            callback: v => v.toFixed(0) + ' m/s',
          },
          min: 0,
        }
      }
    }
  });
}

function degToDir(deg) {
  const dirs = ['北','北北東','北東','東北東','東','東南東','南東','南南東','南','南南西','南西','西南西','西','西北西','北西','北北西'];
  return dirs[Math.round(deg / 22.5) % 16];
}
</script>
</body>
</html>
