<title>Font Awesome アイコン一覧</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f6f8;
    --surface: #ffffff;
    --border: #e2e5ea;
    --text: #1a1d23;
    --text-muted: #6b7280;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --accent-dark: #1d4ed8;
    --tag-bg: #f0f4ff;
    --tag-text: #3b5bdb;
    --radius: 10px;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
    --icon-size: 1.6rem;
    --icon-color: #2563eb;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  header h1 {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0.75rem;
  }

  header h1 i {
    color: var(--accent);
    font-size: 1.1rem;
  }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .style-bar {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
    padding: 0.6rem 0.9rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-top: 0.6rem;
  }

  .style-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .style-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    white-space: nowrap;
    font-weight: 500;
  }

  #sizeSlider {
    width: 100px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  #sizeVal {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text);
    min-width: 34px;
  }

  #colorPicker {
    width: 34px;
    height: 28px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px;
    cursor: pointer;
    background: var(--surface);
  }

  .preset-colors {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .preset-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.12s, border-color 0.12s;
    flex-shrink: 0;
  }

  .preset-dot:hover { transform: scale(1.2); }
  .preset-dot.active { border-color: var(--text); }

  #search {
    flex: 1;
    min-width: 200px;
    max-width: 320px;
    padding: 0.5rem 1rem 0.5rem 2.4rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.875rem;
    background: var(--bg);
    color: var(--text);
    position: relative;
    outline: none;
    transition: border-color 0.15s;
  }

  #search:focus { border-color: var(--accent); background: #fff; }

  .search-wrap {
    position: relative;
  }
  .search-wrap i {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 0.85rem;
    pointer-events: none;
  }

  .filter-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 0.4rem 0.85rem;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 500;
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .stat {
    margin-left: auto;
    font-size: 0.78rem;
    color: var(--text-muted);
    white-space: nowrap;
    align-self: center;
  }

  main {
    padding: 1.5rem 2rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  .section {
    margin-bottom: 2.5rem;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1.5px solid var(--border);
  }

  .section-header h2 {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
  }

  .section-badge {
    font-size: 0.72rem;
    background: var(--tag-bg);
    color: var(--tag-text);
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    margin-left: auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
  }

  .icon-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 0.5rem 0.75rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .icon-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
    transform: translateY(-1px);
  }

  .icon-card.copied {
    border-color: #16a34a;
    background: #f0fdf4;
  }

  .icon-card i {
    font-size: var(--icon-size);
    color: var(--icon-color);
    display: block;
    margin-bottom: 0.5rem;
    line-height: 1;
  }

  .icon-name {
    font-size: 0.68rem;
    color: var(--text-muted);
    word-break: break-all;
    line-height: 1.3;
    font-family: monospace;
  }

  .copy-hint {
    position: absolute;
    top: 0; left: 0; right: 0;
    background: #16a34a;
    color: #fff;
    font-size: 0.7rem;
    padding: 3px;
    text-align: center;
    transform: translateY(-100%);
    transition: transform 0.15s;
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .icon-card.copied .copy-hint { transform: translateY(0); }

  .hidden { display: none !important; }

  .no-result {
    grid-column: 1 / -1;
    text-align: center;
    padding: 3rem;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  footer {
    text-align: center;
    padding: 2rem;
    font-size: 0.78rem;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    margin-top: 1rem;
  }

  @media (max-width: 600px) {
    header, main { padding-left: 1rem; padding-right: 1rem; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
  }
</style>

const PRESETS = [
  { color: '#2563eb', label: 'ブルー' },
  { color: '#16a34a', label: 'グリーン' },
  { color: '#dc2626', label: 'レッド' },
  { color: '#d97706', label: 'オレンジ' },
  { color: '#7c3aed', label: 'パープル' },
  { color: '#0891b2', label: 'シアン' },
  { color: '#be185d', label: 'ピンク' },
  { color: '#854d0e', label: 'ブラウン' },
  { color: '#374151', label: 'グレー' },
  { color: '#1a1d23', label: 'ブラック' },
];

function updateSize(val) {
  document.documentElement.style.setProperty('--icon-size', val + 'px');
  document.getElementById('sizeVal').textContent = val + 'px';
}

function updateColor(val) {
  document.documentElement.style.setProperty('--icon-color', val);
  document.getElementById('colorPicker').value = val;
  document.querySelectorAll('.preset-dot').forEach(d => {
    d.classList.toggle('active', d.dataset.color === val);
  });
}

function initPresets() {
  const wrap = document.getElementById('presetColors');
  PRESETS.forEach(p => {
    const dot = document.createElement('div');
    dot.className = 'preset-dot' + (p.color === '#2563eb' ? ' active' : '');
    dot.style.background = p.color;
    dot.dataset.color = p.color;
    dot.title = p.label;
    dot.addEventListener('click', () => updateColor(p.color));
    wrap.appendChild(dot);
  });
}

let currentFilter = 'all';
let searchTerm = '';

function groupByCategory(icons) {
  const map = {};
  icons.forEach(ic => {
    if (!map[ic.cat]) map[ic.cat] = [];
    map[ic.cat].push(ic);
  });
  return map;
}

function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function filterIcons() {
  searchTerm = document.getElementById('search').value.trim().toLowerCase();
  render();
}

function copyClass(cls, card) {
  navigator.clipboard.writeText(cls).then(() => {
    card.classList.add('copied');
    setTimeout(() => card.classList.remove('copied'), 1200);
  });
}

function render() {
  let filtered = ICONS.filter(ic => {
    const catOk = currentFilter === 'all' || ic.cat === currentFilter;
    const termOk = !searchTerm || ic.name.toLowerCase().includes(searchTerm) || ic.cls.toLowerCase().includes(searchTerm);
    return catOk && termOk;
  });

  const total = filtered.length;
  document.getElementById('stat').textContent = `${total} / ${ICONS.length} 件`;

  const main = document.getElementById('main');
  main.innerHTML = '';

  if (total === 0) {
    main.innerHTML = '<p style="text-align:center;padding:3rem;color:var(--text-muted);">該当するアイコンが見つかりませんでした。</p>';
    return;
  }

  if (currentFilter !== 'all' || searchTerm) {
    // flat grid
    const section = document.createElement('div');
    section.className = 'section';
    const grid = document.createElement('div');
    grid.className = 'grid';
    filtered.forEach(ic => grid.appendChild(makeCard(ic)));
    section.appendChild(grid);
    main.appendChild(section);
  } else {
    const grouped = groupByCategory(filtered);
    Object.entries(grouped).forEach(([cat, icons]) => {
      const section = document.createElement('div');
      section.className = 'section';
      section.innerHTML = `<div class="section-header"><h2>${cat}</h2><span class="section-badge">${icons.length} 個</span></div>`;
      const grid = document.createElement('div');
      grid.className = 'grid';
      icons.forEach(ic => grid.appendChild(makeCard(ic)));
      section.appendChild(grid);
      main.appendChild(section);
    });
  }
}

function makeCard(ic) {
  const card = document.createElement('div');
  card.className = 'icon-card';
  card.title = `クリックでコピー: ${ic.cls}`;
  card.innerHTML = `
    <div class="copy-hint">コピーしました</div>
    <i class="${ic.cls}" aria-hidden="true"></i>
    <div class="icon-name">${ic.name}</div>
  `;
  card.addEventListener('click', () => copyClass(ic.cls, card));
  return card;
}

initPresets();
render();
