<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字読みクイズ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif; background: #f5f4f0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
#app { width: 100%; max-width: 600px; }
.screen { display: none; }
.screen.active { display: block; }

.progress-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
.progress-bar-bg { flex: 1; height: 4px; background: #ddd; border-radius: 9px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: #222; border-radius: 9px; transition: width .4s ease; }
.progress-label { font-size: 12px; color: #888; min-width: 48px; text-align: right; }

.score-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1.25rem; }
.q-num { font-size: 13px; color: #888; }
.score-now { font-size: 13px; color: #888; }

.kanji-card { background: #fff; border-radius: 14px; padding: 2.25rem 1.5rem 1.75rem; text-align: center; margin-bottom: 1.5rem; border: 1px solid #e8e8e4; }
.kanji-display { font-size: 72px; font-weight: 500; font-family: "Yu Mincho", "Hiragino Mincho ProN", serif; line-height: 1; color: #111; margin-bottom: 0.5rem; }
.kanji-hint { font-size: 13px; color: #999; }

.choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
.choice-btn {
  background: #fff;
  border: 1px solid #d8d8d4;
  border-radius: 10px;
  padding: 14px 12px;
  font-size: 20px;
  font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
  color: #111;
  cursor: pointer;
  transition: background .15s, border-color .15s, transform .1s;
  line-height: 1.2;
}
.choice-btn:hover:not(:disabled) { background: #f5f4f0; border-color: #aaa; }
.choice-btn:active:not(:disabled) { transform: scale(0.97); }
.choice-btn.correct { background: #EAF3DE; border-color: #639922; color: #3B6D11; }
.choice-btn.wrong { background: #FCEBEB; border-color: #A32D2D; color: #791F1F; }
.choice-btn:disabled { cursor: default; }

.feedback-area { margin-bottom: 1.25rem; }
.feedback-msg { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.feedback-msg.ok { color: #3B6D11; }
.feedback-msg.ng { color: #A32D2D; }
.feedback-sub { font-size: 13px; color: #555; margin-bottom: 8px; }

.meaning-box {
  display: none;
  background: #faf9f6;
  border: 1px solid #e0dfd9;
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 13px;
  color: #444;
  line-height: 1.75;
  text-align: left;
}
.meaning-box.visible { display: block; }
.meaning-label {
  font-size: 11px;
  font-weight: 600;
  color: #999;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
  text-transform: uppercase;
}

.next-btn {
  width: 100%;
  background: #111;
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-size: 15px;
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  margin-top: 1rem;
}
.next-btn:hover { opacity: 0.82; }
.next-btn:active { transform: scale(0.98); }
.next-btn:disabled { opacity: .3; cursor: default; }

/* Result */
.result-wrap { text-align: center; padding: 1rem 0; }
.rank-circle {
  width: 120px; height: 120px; border-radius: 50%;
  background: #f0efeb; border: 1px solid #ddd;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1.25rem;
  font-size: 56px; font-family: "Yu Mincho", serif; font-weight: 500;
}
.rank-circle.s { background: #FAEEDA; color: #633806; border-color: #EF9F27; }
.rank-circle.a { background: #EAF3DE; color: #27500A; border-color: #639922; }
.rank-circle.b { background: #E6F1FB; color: #0C447C; border-color: #378ADD; }
.rank-circle.c { background: #EEEDFE; color: #3C3489; border-color: #7F77DD; }
.rank-circle.d { background: #FCEBEB; color: #791F1F; border-color: #E24B4A; }
.result-score { font-size: 28px; font-weight: 600; color: #111; margin-bottom: 8px; }
.result-msg { font-size: 14px; color: #777; margin-bottom: 2rem; }
.result-btns { display: flex; gap: 10px; }
.result-btns button { flex: 1; border-radius: 10px; padding: 13px; font-size: 14px; font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif; cursor: pointer; transition: opacity .15s; border: 1px solid #d8d8d4; }
.result-btns button:hover { opacity: .78; }
.btn-retry { background: #111; color: #fff; border-color: transparent !important; }
.btn-review { background: #fff; color: #111; }

/* Review */
.review-item { border-bottom: 1px solid #eee; padding: 16px 0; display: flex; align-items: flex-start; gap: 14px; }
.review-kanji { font-size: 28px; font-family: "Yu Mincho", serif; min-width: 60px; text-align: center; color: #111; }
.review-info { flex: 1; }
.review-correct-label { font-size: 11px; font-weight: 600; color: #3B6D11; margin-bottom: 2px; }
.review-correct { font-size: 17px; font-family: "Yu Mincho", serif; color: #111; margin-bottom: 4px; }
.review-meaning { font-size: 12px; color: #666; line-height: 1.6; margin-bottom: 4px; }
.review-your { font-size: 12px; color: #888; }
.tag-ok { display: inline-block; background: #EAF3DE; color: #3B6D11; font-size: 11px; padding: 2px 8px; border-radius: 9px; margin-right: 6px; }
.tag-ng { display: inline-block; background: #FCEBEB; color: #A32D2D; font-size: 11px; padding: 2px 8px; border-radius: 9px; margin-right: 6px; }
.back-btn { font-size: 13px; color: #888; background: none; border: none; cursor: pointer; padding: 0 0 1rem; text-decoration: underline; font-family: inherit; }
.review-title { font-size: 17px; font-weight: 600; color: #111; margin-bottom: 1.25rem; }
</style>
</head>
<body>
<div id="app">

<div id="screen-quiz" class="screen active">
  <div class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
    <span class="progress-label" id="prog-label">0 / 20</span>
  </div>
  <div class="score-row">
    <span class="q-num" id="q-num">第 1 問</span>
    <span class="score-now" id="score-now">正解: 0</span>
  </div>
  <div class="kanji-card">
    <div class="kanji-display" id="kanji-disp"></div>
    <div class="kanji-hint">この漢字の正しい読みを選んでください</div>
  </div>
  <div class="choices" id="choices"></div>
  <div class="feedback-area">
    <div class="feedback-msg" id="fb-msg"></div>
    <div class="feedback-sub" id="fb-sub"></div>
    <div class="meaning-box" id="meaning-box">
      <div class="meaning-label">意味</div>
      <div id="meaning-text"></div>
    </div>
  </div>
  <button class="next-btn" id="next-btn" disabled>次の問題</button>
</div>

<div id="screen-result" class="screen">
  <div class="result-wrap">
    <div class="rank-circle" id="rank-circle"></div>
    <div class="result-score" id="result-score"></div>
    <div class="result-msg" id="result-msg"></div>
    <div class="result-btns">
      <button class="btn-retry" onclick="startGame()">もう一度</button>
      <button class="btn-review" onclick="showReview()">復習する</button>
    </div>
  </div>
</div>

<div id="screen-review" class="screen">
  <button class="back-btn" onclick="showScreen('screen-result')">← 結果に戻る</button>
  <div class="review-title" id="review-title"></div>
  <div id="review-list"></div>
</div>

</div>
<script>
const KANJI = [
  {k:"貼付",c:"てんぷ",w:["ちょうふ","はりつけ","てきふ"],m:"書類などを貼り付けること。「ちょうふ」は俗読みで、正しくは「てんぷ」。"},
  {k:"続柄",c:"つづきがら",w:["ぞくがら","つながら","つづきばら"],m:"親族関係の呼び方。父・母・兄弟など、家族の間柄を表す語。"},
  {k:"依存",c:"いそん",w:["いぞん","えそん","いしょん"],m:"他のものに頼って存在・機能すること。「いぞん」は慣用読みとして広く使われるが、本来は「いそん」。"},
  {k:"雰囲気",c:"ふんいき",w:["ふいんき","ふんき","ふにんき"],m:"その場に漂う独特の気配・情緒。「ふいんき」は誤読として定着しているが、正しくは「ふんいき」。"},
  {k:"早急",c:"さっきゅう",w:["そうきゅう","はやきゅう","そっきゅう"],m:"非常に急ぐこと。「そうきゅう」も許容されているが、本来の読みは「さっきゅう」。"},
  {k:"重複",c:"ちょうふく",w:["じゅうふく","かさふく","ちょうぼく"],m:"同じものが重なること。「じゅうふく」は慣用読みとして広まっているが、本来は「ちょうふく」。"},
  {k:"代替",c:"だいたい",w:["だいがえ","かわりたい","だいたえ"],m:"他のものに置き換えること。「だいがえ」は誤読。正しくは「だいたい」。"},
  {k:"消耗",c:"しょうもう",w:["しょうこう","しょうひ","けしもう"],m:"使って減らすこと、また体力や気力が尽きること。「しょうこう」は誤読。"},
  {k:"出納",c:"すいとう",w:["でのう","しゅつのう","でいれ"],m:"金銭や物品の出し入れ・収支の管理のこと。会計用語として使われる。"},
  {k:"相殺",c:"そうさい",w:["あいさつ","そうさつ","あいさい"],m:"互いの利害・損得を差し引いてゼロにすること。「あいさつ（挨拶）」とは別の語。"},
  {k:"堪能",c:"たんのう",w:["かんのう","たえのう","たんなう"],m:"十分に満足すること、また技芸などに非常に優れていること。"},
  {k:"固執",c:"こしつ",w:["こしゅう","こじつ","かたじつ"],m:"自分の意見や考えを頑固に守り変えないこと。「こしゅう」は誤読。"},
  {k:"漏洩",c:"ろうえい",w:["もれよう","ろうもれ","ろうせつ"],m:"秘密や情報などが外部に漏れること。「ろうせつ」とも読むが、「ろうえい」が一般的。"},
  {k:"招聘",c:"しょうへい",w:["しょうせい","まねい","しょうへき"],m:"礼を尽くして人を招くこと。専門家や著名人を正式に招待する際に使う。"},
  {k:"憂鬱",c:"ゆううつ",w:["ゆうめつ","うれいうつ","ゆうこつ"],m:"気持ちが晴れず、ふさぎ込んでいる状態。難しい漢字だが読みもよく間違えられる。"},
  {k:"脆弱",c:"ぜいじゃく",w:["きじゃく","もろじゃく","ぜいよわ"],m:"もろくて弱いこと。システムや体制の弱点を指す際にも使われる。"},
  {k:"進捗",c:"しんちょく",w:["しんぽ","しんはか","しんちょ"],m:"物事が進みはかどること。仕事の「進捗状況」などの形で使われる。"},
  {k:"破綻",c:"はたん",w:["はじょう","やぶれたん","はじれつ"],m:"計画や事業などが行き詰まり、うまくいかなくなること。"},
  {k:"瑕疵",c:"かし",w:["きず","かじ","けっし"],m:"欠点・傷・欠陥のこと。法律・不動産の分野で「瑕疵担保責任」などの形で使われる。"},
  {k:"齟齬",c:"そご",w:["ぎょご","しょご","くいちがい"],m:"物事がうまく噛み合わず、食い違うこと。「齟齬をきたす」の形でよく使われる。"},
  {k:"捺印",c:"なついん",w:["おしいん","なつし","さついん"],m:"書類に印鑑を押すこと。「押印」と同じ意味。「なついん」が正しい読み。"},
  {k:"遵守",c:"じゅんしゅ",w:["そんしゅ","じゅんまもる","ずんしゅ"],m:"法律・規則・命令などをよく守ること。「法令遵守」の形で使われる。"},
  {k:"逼迫",c:"ひっぱく",w:["きんぱく","せまりはく","ひきはく"],m:"事態が差し迫って余裕がなくなること。財政・状況が追い詰められた状態。"},
  {k:"乖離",c:"かいり",w:["そむきり","こうり","かいはなれ"],m:"二つのものが離れてしまうこと。理想と現実の「乖離」などの形で使われる。"},
  {k:"牽引",c:"けんいん",w:["けいいん","ひきいん","けんびき"],m:"引っ張ること。また、物事を主導・先導すること。「経済を牽引する」などの形で使われる。"},
  {k:"稚拙",c:"ちせつ",w:["わかへた","じせつ","ちしつ"],m:"幼稚でつたないこと。技術や文章などが未熟な様子を指す。"},
  {k:"貪欲",c:"どんよく",w:["たんよく","むさぼりよく","どんにん"],m:"飽くことなく欲しがること。非常に強い欲求・欲望の強さを表す。"},
  {k:"諮問",c:"しもん",w:["はかりもん","じもん","しかもん"],m:"専門家や機関に意見・答申を求めること。「審議会に諮問する」などの形で使われる。"},
  {k:"遺憾",c:"いかん",w:["いざん","のこかん","いごん"],m:"期待通りにならず残念に思うこと。「遺憾に思う」「遺憾なく発揮する」などの形で使われる。"},
  {k:"跋扈",c:"ばっこ",w:["はびこり","ばつこ","はっこ"],m:"勢力を張って思うままに振る舞うこと。「悪がはびこる」の意味で使われる。"},
  {k:"逐次",c:"ちくじ",w:["おいおいじ","たくじ","ちゅくじ"],m:"順を追って次々と行うこと。「逐次処理」「逐次報告」などの形で使われる。"},
  {k:"払拭",c:"ふっしょく",w:["はらいふく","ふっし","はらいしき"],m:"すっかり取り除くこと。「不安を払拭する」の形でよく使われる。"},
  {k:"精緻",c:"せいち",w:["せいちゅう","くわしち","せいじ"],m:"細部まで細かく精密なこと。非常に細かく丁寧に作られた様子を表す。"},
  {k:"斬新",c:"ざんしん",w:["きりしん","さんしん","ざんきん"],m:"発想や方法が非常に新鮮で独創的なこと。「斬新なアイデア」の形でよく使われる。"},
  {k:"矜持",c:"きょうじ",w:["ほこりじ","きんじ","きょうち"],m:"自分の能力・価値への誇りや自負心。「プロとしての矜持」などの形で使われる。"},
  {k:"詭弁",c:"きべん",w:["ごまかしべん","ぎべん","きべ"],m:"見た目は正しそうだが実際は誤った論理・議論。相手をごまかすための巧みな弁論。"},
  {k:"捏造",c:"ねつぞう",w:["でつぞう","こねつぞう","ねつくり"],m:"実際にないことを事実のように作り上げること。「記事を捏造する」などの形で使われる。"},
  {k:"歪曲",c:"わいきょく",w:["いがみきょく","おうきょく","わいくつ"],m:"事実を意図的にゆがめること。「事実を歪曲して伝える」などの形で使われる。"},
  {k:"剽窃",c:"ひょうせつ",w:["ぬすみせつ","ひょうたつ","びょうせつ"],m:"他人の文章・アイデアなどを盗んで自分のものとして使うこと。いわゆる「パクリ」の書き言葉。"},
  {k:"蹂躙",c:"じゅうりん",w:["ふみにじり","ぞうりん","じゅうにん"],m:"踏みにじること。人権や規則などを無視して踏みにじる行為。"},
  {k:"嗚咽",c:"おえつ",w:["なきじゃくり","おいつ","あえつ"],m:"声を詰まらせながら泣くこと。悲しみや感動で泣きじゃくる様子。"},
  {k:"逡巡",c:"しゅんじゅん",w:["ためらい","じゅんしゅん","せんじゅん"],m:"決断できずにためらうこと。「逡巡して一歩が踏み出せない」などの形で使われる。"},
  {k:"蹉跌",c:"さてつ",w:["つまずきてつ","しゃてつ","さくてつ"],m:"物事がうまくいかず失敗・挫折すること。「蹉跌を経験する」などの形で使われる。"},
  {k:"喧噪",c:"けんそう",w:["かまびすそう","かんそう","けんざつ"],m:"騒がしくやかましいこと、またその騒音。「都会の喧噪」の形でよく使われる。"},
  {k:"忸怩",c:"じくじ",w:["はじはじ","にくに","じゅくじ"],m:"自分の行いを恥ずかしく思う気持ち。「忸怩たる思い」の形で使われる。"},
  {k:"辟易",c:"へきえき",w:["うんざり","かへき","ひきえき"],m:"嫌になってうんざりすること。しつこさや煩わしさに手を焼く様子。"},
  {k:"懊悩",c:"おうのう",w:["なやみのう","あおのう","おうなや"],m:"悩み苦しむこと。深く思い悩んで胸を痛める状態を表す。"},
  {k:"紐帯",c:"ちゅうたい",w:["ひもたい","じゅうたい","つながりたい"],m:"人と人、国と国などをつなぐ絆・きずな。「家族の紐帯」などの形で使われる。"},
  {k:"贖罪",c:"しょくざい",w:["かうざい","ぞくざい","しょくつみ"],m:"自分の犯した罪や過ちをつぐなうこと。キリスト教的文脈でも使われる語。"},
  {k:"慄然",c:"りつぜん",w:["ぶるぜん","おそれぜん","りつねん"],m:"恐怖や衝撃で体が震えるほどぞっとする様子。「慄然とする光景」などの形で使われる。"},
  {k:"葛藤",c:"かっとう",w:["くずふじ","かつどう","かっとん"],m:"相反する欲求や感情が心の中でぶつかり合うこと。「内なる葛藤」などの形で使われる。"},
  {k:"刹那",c:"せつな",w:["さつな","しゃとな","くさり"],m:"非常に短い瞬間・時間。「刹那的な喜び」などの形で使われる。仏教語が語源。"},
  {k:"所謂",c:"いわゆる",w:["しょきん","しょい","ところがい"],m:"世間一般で言われる・いわゆる、という意味。「所謂エリートというやつだ」などの形で使われる。"},
  {k:"即ち",c:"すなわち",w:["そくち","つまり","ただち"],m:"言い換えれば・つまり・その場でという意味。接続詞として広く使われる。"},
  {k:"概ね",c:"おおむね",w:["がいね","だいたい","かいね"],m:"だいたい・おおよそという意味。「概ね良好」「概ね予定通り」などの形で使われる。"},
  {k:"殊に",c:"ことに",w:["しゅに","とくに","べつに"],m:"特に・とりわけという意味の副詞。「殊に優れた作品」などの形で使われる。"},
  {k:"頗る",c:"すこぶる",w:["はなはだ","たいへん","さかんに"],m:"非常に・とても・極めてという意味の副詞。「頗る優秀な人材」などの形で使われる。"},
  {k:"何卒",c:"なにとぞ",w:["なにそつ","どうか","なんとぞ"],m:"どうか・ぜひともという意味の丁寧な依頼表現。手紙文などでよく使われる。"},
  {k:"尤も",c:"もっとも",w:["ゆうも","ただし","まこと"],m:"確かにその通りという意味、または「ただし」という接続詞としても使われる。"},
  {k:"若しくは",c:"もしくは",w:["わかしくは","じゃくしくは","にゃくしくは"],m:"または・あるいはという意味の接続詞。法律文書などで「または」と使い分ける。"},
  {k:"彷徨う",c:"さまよう",w:["ほうこう","うろつく","まよう"],m:"あてもなくうろうろと歩き回ること。精神的に迷い続けることも指す。"},
  {k:"慄く",c:"おののく",w:["りつく","ふるえく","おそれく"],m:"恐怖や寒さで体が震えること。強い恐れや畏れを感じる様子。"},
  {k:"躊躇う",c:"ためらう",w:["ちゅうちょう","とまどう","まよう"],m:"決断できずに迷うこと。「躊躇なく行動する」の「躊躇」と同じ字。"},
  {k:"嗜む",c:"たしなむ",w:["しむ","このむ","うしなむ"],m:"趣味として楽しむ・適度に親しむこと。「お茶を嗜む」「嗜み」などの形で使われる。"},
  {k:"逞しい",c:"たくましい",w:["ていしい","つよしい","ちからしい"],m:"体・精神が力強くしっかりしている様子。「逞しく育つ」などの形で使われる。"},

const TOTAL = 20;
let questions = [], idx = 0, score = 0, answered = false, history = [];

function shuffle(a) { return [...a].sort(() => Math.random() - .5); }

function startGame() {
  questions = shuffle(KANJI).slice(0, TOTAL);
  idx = 0; score = 0; answered = false; history = [];
  showScreen('screen-quiz');
  renderQ();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderQ() {
  const q = questions[idx];
  answered = false;
  document.getElementById('prog-fill').style.width = (idx / TOTAL * 100) + '%';
  document.getElementById('prog-label').textContent = idx + ' / ' + TOTAL;
  document.getElementById('q-num').textContent = '第 ' + (idx + 1) + ' 問';
  document.getElementById('score-now').textContent = '正解: ' + score;
  document.getElementById('kanji-disp').textContent = q.k;
  document.getElementById('fb-msg').textContent = '';
  document.getElementById('fb-sub').textContent = '';
  document.getElementById('meaning-box').classList.remove('visible');
  document.getElementById('meaning-text').textContent = '';
  document.getElementById('next-btn').disabled = true;
  document.getElementById('next-btn').textContent = idx + 1 >= TOTAL ? '結果を見る' : '次の問題';

  const choices = shuffle([q.c, ...q.w.slice(0, 3)]);
  const wrap = document.getElementById('choices');
  wrap.innerHTML = '';
  choices.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = ch;
    btn.onclick = () => checkAnswer(ch, q);
    wrap.appendChild(btn);
  });
}

function checkAnswer(chosen, q) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === q.c) b.classList.add('correct');
    else if (b.textContent === chosen && chosen !== q.c) b.classList.add('wrong');
  });
  const ok = chosen === q.c;
  if (ok) score++;
  history.push({ k: q.k, c: q.c, chosen, ok, m: q.m });
  const fbMsg = document.getElementById('fb-msg');
  fbMsg.className = 'feedback-msg ' + (ok ? 'ok' : 'ng');
  fbMsg.textContent = ok ? '正解！' : '不正解…';
  document.getElementById('fb-sub').textContent = ok
    ? '「' + q.k + '」の読みは「' + q.c + '」です。'
    : '正解は「' + q.c + '」でした。';
  document.getElementById('meaning-text').textContent = q.m;
  document.getElementById('meaning-box').classList.add('visible');
  document.getElementById('score-now').textContent = '正解: ' + score;
  document.getElementById('next-btn').disabled = false;
}

document.getElementById('next-btn').onclick = () => {
  idx++;
  if (idx >= TOTAL) showResult();
  else renderQ();
};

function showResult() {
  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('prog-label').textContent = TOTAL + ' / ' + TOTAL;
  showScreen('screen-result');
  const pct = Math.round(score / TOTAL * 100);
  let rank, msg;
  if (pct >= 90) { rank = 'S'; msg = '漢字マスター！完璧な成績です。'; }
  else if (pct >= 70) { rank = 'A'; msg = '素晴らしい！よく読めています。'; }
  else if (pct >= 50) { rank = 'B'; msg = 'まずまずの成績。もう一度挑戦！'; }
  else if (pct >= 30) { rank = 'C'; msg = 'もっと練習が必要です。'; }
  else { rank = 'D'; msg = 'これを機に漢字を勉強しましょう！'; }
  const rc = document.getElementById('rank-circle');
  rc.className = 'rank-circle ' + rank.toLowerCase();
  rc.textContent = rank;
  document.getElementById('result-score').textContent = score + ' / ' + TOTAL + ' 問正解（' + pct + '%）';
  document.getElementById('result-msg').textContent = msg;
}

function showReview() {
  showScreen('screen-review');
  const wrong = history.filter(h => !h.ok);
  document.getElementById('review-title').textContent = wrong.length === 0
    ? '全問正解！復習する問題はありません。'
    : '間違えた問題：' + wrong.length + ' 問';
  const list = document.getElementById('review-list');
  list.innerHTML = '';
  history.forEach(h => {
    const div = document.createElement('div');
    div.className = 'review-item';
    const tag = h.ok ? '<span class="tag-ok">正解</span>' : '<span class="tag-ng">不正解</span>';
    div.innerHTML = `
      <div class="review-kanji">${h.k}</div>
      <div class="review-info">
        <div class="review-correct-label">正しい読み</div>
        <div class="review-correct">${h.c}</div>
        <div class="review-meaning">${h.m}</div>
        <div class="review-your">${tag}${h.ok ? '' : 'あなたの答え：' + h.chosen}</div>
      </div>`;
    list.appendChild(div);
  });
}

startGame();
</script>
