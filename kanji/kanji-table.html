<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>読みを間違えやすい漢字</title>
<!-- DataTables CSS -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<style>
body { margin: 20px; }
h1 { font-size: 16px; }
table {
	font-size: 18px;
	border-collapse: collapse !important;
}
table td {
	background: #eee;
}
table tr:nth-child(odd) td {	/* 奇数行、偶数行ごとに背景色を設定する */
	background: #fff;
}
th, td {
	border-collapse: collapse;
	border: 1px solid #888;
	margin: 0 !important;
	padding: 2px !important;
	text-align: left;
}
th {
	background-color: #ddd;
}
mark { background: gold; color: black; }
</style>
</head>
<body>
<h1>読みを間違えやすい漢字</h1>
<div id="csv-table-container"></div>
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.jsdelivr.net/g/mark.js(jquery.mark.min.js),datatables.mark.js"></script>
<script>
// 表示する列のインデックス（0始まり）: 1列目=0, 2列目=1, 6列目=5
const DISPLAY_COLUMNS = [0, 1, 5];

// CSVを読み込んでテーブルに表示する関数
async function loadCsvAndDisplay() {
	try {
		// CSVファイルを取得（固定パス）
		const response = await fetch('csv/kanji_data.csv');
		if (!response.ok) {
			throw new Error(`HTTPエラー: ${response.status}`);
		}
		// CSVテキストデータを取得
		const csvText = await response.text();
		// CSVを配列に変換
		const rows = csvText.split('\n').filter(row => row.trim() !== '');
		const tableData = rows.map(row => row.split(','));
		// HTMLテーブルを生成
		const table = document.createElement('table');
		table.id = 'dataTable';
		// <thead>を生成（指定列のみ）
		const thead = document.createElement('thead');
		const headerRow = document.createElement('tr');
		DISPLAY_COLUMNS.forEach(colIdx => {
			const th = document.createElement('th');
			th.textContent = (tableData[0][colIdx] || '').trim();
			headerRow.appendChild(th);
		});
		thead.appendChild(headerRow);
		table.appendChild(thead);
		// <tbody>を生成（指定列のみ）
		const tbody = document.createElement('tbody');
		for (let i = 1; i < tableData.length; i++) {
			const row = document.createElement('tr');
			DISPLAY_COLUMNS.forEach(colIdx => {
				const td = document.createElement('td');
				td.textContent = (tableData[i][colIdx] || '').trim();
				row.appendChild(td);
			});
			tbody.appendChild(row);
		}
		table.appendChild(tbody);
		// コンテナにテーブルを追加
		document.getElementById('csv-table-container').appendChild(table);
		// DataTablesを初期化
		$('#dataTable').DataTable({
			language: {	// 日本語化
				url: "//cdn.datatables.net/plug-ins/9dcbecd42ad/i18n/Japanese.json"
			},
			paging: false,		// ページングしない。
			ordering: true,
			order: [],		// 初期表示時のソートを無効にする
			mark: true		// 検索文字列ハイライト (by mark.js)
		});
	} catch (error) {
		console.error('エラー:', error);
		document.getElementById('csv-table-container').textContent = `エラー: ${error.message}`;
	}
}
loadCsvAndDisplay();
</script>
</body>
</html>
