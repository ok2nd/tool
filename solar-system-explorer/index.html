<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太陽系エクスプローラー</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --gold: #ffd700;
    --panel-bg: rgba(5, 10, 25, 0.92);
    --border: rgba(0, 212, 255, 0.3);
  }

  body {
    background: #000;
    color: #e0e8ff;
    font-family: 'Exo 2', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: crosshair;
  }

  #canvas-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  #solar-canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    cursor: crosshair;
  }

  /* ── Header ── */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, rgba(0,5,20,0.95) 0%, transparent 100%);
    pointer-events: none;
  }

  #header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 4px;
    color: #fff;
    text-shadow: 0 0 20px rgba(0,212,255,0.8);
  }

  #header h1 span { color: var(--accent); }

  #clock {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    opacity: 0.8;
    pointer-events: none;
  }

  /* ── Speed control ── */
  #controls {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 20px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 10px 24px;
    backdrop-filter: blur(12px);
  }

  #controls label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  #speed-slider {
    -webkit-appearance: none;
    width: 140px;
    height: 3px;
    background: rgba(0,212,255,0.2);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    cursor: pointer;
  }

  #speed-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #fff;
    min-width: 28px;
    text-align: right;
  }

  #pause-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 30px; height: 30px;
    color: var(--accent);
    font-size: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  #pause-btn:hover { background: rgba(0,212,255,0.15); }

  /* ── Info Panel ── */
  #info-panel {
    position: fixed;
    top: 0; right: 0;
    width: 320px;
    height: 100vh;
    z-index: 10;
    background: var(--panel-bg);
    border-left: 1px solid var(--border);
    backdrop-filter: blur(20px);
    transform: translateX(100%);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    overflow-y: auto;
    padding: 0 0 80px;
  }

  #info-panel.open { transform: translateX(0); }

  #panel-header {
    padding: 72px 28px 24px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  #planet-icon {
    width: 60px; height: 60px;
    border-radius: 50%;
    margin-bottom: 16px;
  }

  #planet-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #fff;
  }

  #planet-subtitle {
    font-size: 13px;
    color: rgba(0,212,255,0.6);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 2px;
    margin-top: 4px;
  }

  #close-btn {
    position: absolute;
    top: 20px; right: 20px;
    background: none;
    border: 1px solid var(--border);
    color: var(--accent);
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  #close-btn:hover { background: rgba(0,212,255,0.15); }

  .data-section {
    padding: 20px 28px;
    border-bottom: 1px solid rgba(0,212,255,0.1);
  }

  .section-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    opacity: 0.6;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  .data-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .data-row:last-child { border-bottom: none; }

  .data-label {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    font-family: 'Share Tech Mono', monospace;
  }

  .data-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: #fff;
    text-align: right;
    max-width: 180px;
  }

  .data-value.highlight { color: var(--accent); }

  #planet-desc {
    padding: 20px 28px;
    font-size: 14px;
    line-height: 1.8;
    color: rgba(255,255,255,0.6);
    font-weight: 300;
  }

  /* ── Hint ── */
  #hint {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: rgba(0,212,255,0.4);
    letter-spacing: 2px;
    pointer-events: none;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.9} }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    z-index: 20;
    background: rgba(5,10,25,0.95);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: #fff;
    pointer-events: none;
    display: none;
    transform: translate(-50%, -140%);
  }

  /* Scrollbar */
  #info-panel::-webkit-scrollbar { width: 3px; }
  #info-panel::-webkit-scrollbar-track { background: transparent; }
  #info-panel::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.3); border-radius: 2px; }
</style>
</head>
<body>

<canvas id="canvas-bg"></canvas>
<canvas id="solar-canvas"></canvas>

<div id="header">
  <h1>SOLAR<span>SYS</span> EXPLORER</h1>
  <div id="clock">--.--.---- / --:--:--</div>
</div>

<div id="hint">▸ 惑星をクリックして詳細を表示</div>
<div id="tooltip"></div>

<div id="controls">
  <label>速度</label>
  <input type="range" id="speed-slider" min="0.1" max="5" step="0.1" value="1">
  <span id="speed-value">×1.0</span>
  <button id="pause-btn" title="一時停止">⏸</button>
</div>

<div id="info-panel">
  <div id="panel-header">
    <canvas id="planet-icon" width="60" height="60"></canvas>
    <div id="planet-name">—</div>
    <div id="planet-subtitle">—</div>
    <button id="close-btn" title="閉じる">✕</button>
  </div>
  <div class="data-section">
    <div class="section-title">■ 軌道データ</div>
    <div class="data-row"><span class="data-label">太陽からの距離</span><span class="data-value highlight" id="d-distance">—</span></div>
    <div class="data-row"><span class="data-label">公転周期</span><span class="data-value" id="d-period">—</span></div>
    <div class="data-row"><span class="data-label">公転速度</span><span class="data-value" id="d-orbital-vel">—</span></div>
    <div class="data-row"><span class="data-label">軌道離心率</span><span class="data-value" id="d-eccentricity">—</span></div>
  </div>
  <div class="data-section">
    <div class="section-title">■ 物理データ</div>
    <div class="data-row"><span class="data-label">直径</span><span class="data-value" id="d-diameter">—</span></div>
    <div class="data-row"><span class="data-label">質量 (地球比)</span><span class="data-value highlight" id="d-mass">—</span></div>
    <div class="data-row"><span class="data-label">重力 (地球比)</span><span class="data-value" id="d-gravity">—</span></div>
    <div class="data-row"><span class="data-label">自転周期</span><span class="data-value" id="d-rotation">—</span></div>
    <div class="data-row"><span class="data-label">衛星数</span><span class="data-value" id="d-moons">—</span></div>
  </div>
  <div class="data-section">
    <div class="section-title">■ 環境データ</div>
    <div class="data-row"><span class="data-label">平均気温</span><span class="data-value" id="d-temp">—</span></div>
    <div class="data-row"><span class="data-label">大気組成</span><span class="data-value" id="d-atm">—</span></div>
  </div>
  <div id="planet-desc">—</div>
</div>

    },
    desc:'太陽系で最も遠い惑星。太陽系最強の風（最大2,100 km/h）が吹き荒れる。衛星トリトンは逆行軌道をもつ特異な衛星で、海王星に接近しつつある。'

// ─── Canvas & State ───────────────────────────────
const bgCanvas = document.getElementById('canvas-bg');
const bgCtx = bgCanvas.getContext('2d');
const canvas = document.getElementById('solar-canvas');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, scale;
let paused = false;
let speedMul = 1.0;
let angles = PLANETS.map(() => Math.random() * Math.PI * 2);
let stars = [];
let selectedPlanet = null;
let hoveredPlanet = null;
let animId;
let lastTime = null;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = bgCanvas.width = W;
  canvas.height = bgCanvas.height = H;
  cx = W / 2; cy = H / 2;
  scale = Math.min(W, H) / 1100;
  drawStars();
}

// ─── Stars ───────────────────────────────────────
function generateStars() {
  stars = [];
  for (let i = 0; i < 600; i++) {
    stars.push({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.4 + 0.2,
      bright: Math.random(),
      twinkle: Math.random() * Math.PI * 2,
      twinkleSpeed: 0.5 + Math.random() * 1.5
    });
  }
}

function drawStars() {
  bgCtx.clearRect(0, 0, W, H);
  bgCtx.fillStyle = '#000008';
  bgCtx.fillRect(0, 0, W, H);

  // Nebula wisps
  const grad = bgCtx.createRadialGradient(W*0.2, H*0.3, 0, W*0.2, H*0.3, W*0.4);
  grad.addColorStop(0, 'rgba(30,10,60,0.25)');
  grad.addColorStop(1, 'transparent');
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0, 0, W, H);

  const grad2 = bgCtx.createRadialGradient(W*0.8, H*0.7, 0, W*0.8, H*0.7, W*0.35);
  grad2.addColorStop(0, 'rgba(0,20,60,0.2)');
  grad2.addColorStop(1, 'transparent');
  bgCtx.fillStyle = grad2;
  bgCtx.fillRect(0, 0, W, H);

  for (const s of stars) {
    const brightness = 0.4 + 0.6 * s.bright;
    const hue = s.bright > 0.8 ? '200,220,255' : s.bright > 0.5 ? '220,230,255' : '255,255,255';
    bgCtx.beginPath();
    bgCtx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    bgCtx.fillStyle = `rgba(${hue},${brightness})`;
    bgCtx.fill();
  }
}

function animateStars(t) {
  for (const s of stars) {
    s.twinkle += s.twinkleSpeed * 0.01;
  }
}

// ─── Drawing ─────────────────────────────────────
function drawSun() {
  // Outer corona
  const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 90 * scale);
  cg.addColorStop(0, 'rgba(255,220,80,0.25)');
  cg.addColorStop(0.5, 'rgba(255,150,20,0.08)');
  cg.addColorStop(1, 'transparent');
  ctx.fillStyle = cg;
  ctx.beginPath();
  ctx.arc(cx, cy, 90 * scale, 0, Math.PI * 2);
  ctx.fill();

  // Inner glow
  const ig = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40 * scale);
  ig.addColorStop(0, '#fff7e0');
  ig.addColorStop(0.3, '#ffd040');
  ig.addColorStop(0.7, '#ff8800');
  ig.addColorStop(1, '#ff4400');
  ctx.fillStyle = ig;
  ctx.beginPath();
  ctx.arc(cx, cy, 28 * scale, 0, Math.PI * 2);
  ctx.fill();
}

function drawOrbit(r) {
  ctx.beginPath();
  ctx.arc(cx, cy, r * scale, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,212,255,0.08)';
  ctx.lineWidth = 0.5;
  ctx.stroke();
}

function getPlanetPos(p, idx) {
  return {
    x: cx + Math.cos(angles[idx]) * p.orbitR * scale,
    y: cy + Math.sin(angles[idx]) * p.orbitR * scale
  };
}

function drawPlanet(p, idx) {
  const pos = getPlanetPos(p, idx);
  const r = p.radius * scale * (hoveredPlanet === idx ? 1.25 : 1);
  const isSelected = selectedPlanet === idx;
  const isHovered = hoveredPlanet === idx;

  // Selection ring
  if (isSelected || isHovered) {
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r + 5 * scale, 0, Math.PI * 2);
    ctx.strokeStyle = isSelected ? 'rgba(0,212,255,0.8)' : 'rgba(0,212,255,0.4)';
    ctx.lineWidth = isSelected ? 1.5 : 1;
    ctx.stroke();
  }

  // Saturn rings
  if (p.rings) {
    ctx.save();
    ctx.translate(pos.x, pos.y);
    ctx.scale(1, 0.35);
    ctx.beginPath();
    ctx.arc(0, 0, r * 2.2, 0, Math.PI * 2);
    ctx.strokeStyle = p.id === 'saturn' ? 'rgba(228,201,126,0.45)' : 'rgba(125,232,232,0.3)';
    ctx.lineWidth = p.id === 'saturn' ? 5 * scale : 3 * scale;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(0, 0, r * 1.75, 0, Math.PI * 2);
    ctx.strokeStyle = p.id === 'saturn' ? 'rgba(228,201,126,0.3)' : 'rgba(125,232,232,0.2)';
    ctx.lineWidth = 3 * scale;
    ctx.stroke();
    ctx.restore();
  }

  // Planet body
  const pg = ctx.createRadialGradient(pos.x - r*0.3, pos.y - r*0.3, r*0.1, pos.x, pos.y, r);
  pg.addColorStop(0, lighten(p.color, 0.3));
  pg.addColorStop(0.6, p.color);
  pg.addColorStop(1, p.color2);
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
  ctx.fillStyle = pg;
  ctx.fill();

  // Jupiter bands
  if (p.bands) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
    ctx.clip();
    const bandColors = ['rgba(120,70,20,0.3)','rgba(255,200,100,0.15)','rgba(120,70,20,0.25)'];
    const offsets = [-r*0.4, 0, r*0.4];
    for (let b=0; b<3; b++) {
      ctx.fillStyle = bandColors[b];
      ctx.fillRect(pos.x - r, pos.y + offsets[b] - r*0.15, r*2, r*0.25);
    }
    // Great Red Spot
    ctx.beginPath();
    ctx.ellipse(pos.x + r*0.2, pos.y, r*0.25, r*0.15, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(160,50,20,0.55)';
    ctx.fill();
    ctx.restore();
  }

  // Earth ocean effect
  if (p.id === 'earth') {
    ctx.save();
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
    ctx.clip();
    ctx.fillStyle = 'rgba(20,80,50,0.6)';
    ctx.beginPath();
    ctx.ellipse(pos.x - r*0.2, pos.y + r*0.1, r*0.35, r*0.55, -0.5, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(pos.x + r*0.25, pos.y - r*0.2, r*0.2, r*0.3, 0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // Glow
  const glow = ctx.createRadialGradient(pos.x, pos.y, r*0.8, pos.x, pos.y, r*1.6);
  glow.addColorStop(0, p.color + '40');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, r * 1.6, 0, Math.PI * 2);
  ctx.fill();

  // Label
  if (scale > 0.55 || isHovered) {
    ctx.font = `${Math.max(9, 11*scale)}px 'Exo 2', sans-serif`;
    ctx.fillStyle = isHovered ? '#fff' : 'rgba(180,200,255,0.7)';
    ctx.textAlign = 'center';
    ctx.fillText(p.name, pos.x, pos.y + r + 14 * scale);
  }
}

function lighten(hex, amt) {
  const c = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (c >> 16) + Math.round(amt * 255));
  const g = Math.min(255, ((c >> 8) & 0xff) + Math.round(amt * 255));
  const b = Math.min(255, (c & 0xff) + Math.round(amt * 255));
  return `rgb(${r},${g},${b})`;
}

// ─── Animation Loop ───────────────────────────────
function frame(ts) {
  animId = requestAnimationFrame(frame);
  const dt = lastTime ? Math.min((ts - lastTime) / 1000, 0.05) : 0.016;
  lastTime = ts;

  if (!paused) {
    PLANETS.forEach((p, i) => {
      angles[i] += p.speed * 0.008 * speedMul * dt * 60;
    });
  }

  ctx.clearRect(0, 0, W, H);

  PLANETS.forEach(p => drawOrbit(p.orbitR));
  drawSun();
  PLANETS.forEach((p, i) => drawPlanet(p, i));

  updateClock();
}

function updateClock() {
  const now = new Date();
  const s = now.toLocaleDateString('ja-JP').replace(/\//g,'.') + ' / ' +
    now.toLocaleTimeString('ja-JP', {hour12:false});
  document.getElementById('clock').textContent = s;
}

// ─── Interaction ──────────────────────────────────
function getHitPlanet(mx, my) {
  for (let i = PLANETS.length - 1; i >= 0; i--) {
    const pos = getPlanetPos(PLANETS[i], i);
    const r = PLANETS[i].radius * scale * 1.4;
    const dx = mx - pos.x, dy = my - pos.y;
    if (dx*dx + dy*dy < r*r) return i;
  }
  return -1;
}

canvas.addEventListener('mousemove', e => {
  const idx = getHitPlanet(e.clientX, e.clientY);
  hoveredPlanet = idx >= 0 ? idx : null;
  canvas.style.cursor = idx >= 0 ? 'pointer' : 'crosshair';

  const tip = document.getElementById('tooltip');
  if (idx >= 0) {
    tip.style.display = 'block';
    tip.style.left = e.clientX + 'px';
    tip.style.top = e.clientY + 'px';
    tip.textContent = PLANETS[idx].nameEn;
  } else {
    tip.style.display = 'none';
  }
});

canvas.addEventListener('click', e => {
  const idx = getHitPlanet(e.clientX, e.clientY);
  if (idx >= 0) {
    openPanel(idx);
  }
});

canvas.addEventListener('mouseleave', () => {
  hoveredPlanet = null;
  document.getElementById('tooltip').style.display = 'none';
});

function openPanel(idx) {
  selectedPlanet = idx;
  const p = PLANETS[idx];
  document.getElementById('planet-name').textContent = p.name;
  document.getElementById('planet-subtitle').textContent = p.subtitle;
  document.getElementById('d-distance').textContent = p.data.distance;
  document.getElementById('d-period').textContent = p.data.period;
  document.getElementById('d-orbital-vel').textContent = p.data.orbitalVel;
  document.getElementById('d-eccentricity').textContent = p.data.eccentricity;
  document.getElementById('d-diameter').textContent = p.data.diameter;
  document.getElementById('d-mass').textContent = p.data.mass + ' 倍';
  document.getElementById('d-gravity').textContent = p.data.gravity + ' 倍';
  document.getElementById('d-rotation').textContent = p.data.rotation;
  document.getElementById('d-moons').textContent = p.data.moons;
  document.getElementById('d-temp').textContent = p.data.temp;
  document.getElementById('d-atm').textContent = p.data.atm;
  document.getElementById('planet-desc').textContent = p.desc;

  // Draw planet icon
  const ic = document.getElementById('planet-icon');
  const ictx = ic.getContext('2d');
  ictx.clearRect(0,0,60,60);
  const pg = ictx.createRadialGradient(22,20,3,30,30,25);
  pg.addColorStop(0, lighten(p.color, 0.35));
  pg.addColorStop(0.6, p.color);
  pg.addColorStop(1, p.color2);
  ictx.beginPath();
  ictx.arc(30,30,24,0,Math.PI*2);
  ictx.fillStyle = pg;
  ictx.fill();
  if (p.rings) {
    ictx.save();
    ictx.translate(30,30);
    ictx.scale(1,0.3);
    ictx.beginPath();
    ictx.arc(0,0,36,0,Math.PI*2);
    ictx.strokeStyle = p.id==='saturn'?'rgba(228,201,126,0.6)':'rgba(125,232,232,0.4)';
    ictx.lineWidth = 7;
    ictx.stroke();
    ictx.restore();
  }
  if (p.bands) {
    ictx.save();
    ictx.beginPath();
    ictx.arc(30,30,24,0,Math.PI*2);
    ictx.clip();
    ictx.fillStyle='rgba(120,70,20,0.35)';
    ictx.fillRect(6,20,48,7);
    ictx.fillRect(6,32,48,6);
    ictx.restore();
  }

  document.getElementById('info-panel').classList.add('open');
}

document.getElementById('close-btn').addEventListener('click', () => {
  document.getElementById('info-panel').classList.remove('open');
  selectedPlanet = null;
});

// ─── Controls ─────────────────────────────────────
const slider = document.getElementById('speed-slider');
const speedVal = document.getElementById('speed-value');
slider.addEventListener('input', () => {
  speedMul = parseFloat(slider.value);
  speedVal.textContent = '×' + speedMul.toFixed(1);
});

document.getElementById('pause-btn').addEventListener('click', () => {
  paused = !paused;
  document.getElementById('pause-btn').textContent = paused ? '▶' : '⏸';
});

window.addEventListener('resize', () => { resize(); drawStars(); });

// ─── Init ─────────────────────────────────────────
generateStars();
resize();
frame(performance.now());
</script>
